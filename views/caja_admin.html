<!-- views/caja_admin.html — Caja Seamus (fondo personal del administrador) -->
<style>
  .prov-section-tabs {
    display: flex;
    padding: 0 20px;
    border-bottom: 2px solid var(--color-border);
    background: var(--color-background);
  }
  .prov-section-tab {
    padding: 10px 18px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--color-text-secondary);
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .prov-section-tab:hover { color: var(--color-primary, #0066cc); }
  .prov-section-tab.active {
    color: var(--color-primary, #0066cc);
    border-bottom-color: var(--color-primary, #0066cc);
  }
</style>

<div class="prov-section-tabs">
  <button class="prov-section-tab active" onclick="window.location.hash='caja_admin'">💼 Caja Seamus</button>
  <button class="prov-section-tab" onclick="window.location.hash='adelanto_pago'">💳 Adelanto de Pago</button>
</div>

<!-- Saldo actual -->
<div id="caja-admin-saldo-card" class="card" style="margin-top:var(--spacing-lg);padding:20px 28px;display:flex;align-items:center;gap:32px;">
  <div>
    <div style="font-size:12px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">Saldo disponible</div>
    <div id="caja-admin-saldo" style="font-size:2rem;font-weight:700;color:var(--color-text);">$0</div>
  </div>
  <div style="display:flex;gap:24px;margin-left:auto;">
    <div style="text-align:right;">
      <div style="font-size:11px;color:var(--color-text-secondary);">Total ingresos</div>
      <div id="caja-admin-total-ing" style="font-size:1.1rem;font-weight:600;color:#2e7d32;">$0</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:11px;color:var(--color-text-secondary);">Total egresos</div>
      <div id="caja-admin-total-egr" style="font-size:1.1rem;font-weight:600;color:#c62828;">$0</div>
    </div>
  </div>
</div>

<!-- Historial de movimientos -->
<div class="card" style="margin-top:var(--spacing-lg);">
  <div style="padding:16px 20px 12px;border-bottom:1px solid var(--color-border);">
    <strong>Movimientos</strong>
  </div>
  <div id="caja-admin-movimientos">
    <div style="padding:32px;text-align:center;color:var(--color-text-secondary);">Cargando...</div>
  </div>
</div>
