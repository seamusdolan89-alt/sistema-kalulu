<style>
main#app { overflow: hidden; }

#ci-root {
  display: flex;
  flex-direction: column;
  height: 100%;
  background: #f0f2f5;
  overflow: hidden;
  font-family: inherit;
}

.ci-topbar {
  background: white;
  border-bottom: 1px solid #e0e0e0;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.ci-back-btn {
  background: none;
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 0.88em;
  color: #555;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}
.ci-back-btn:hover { background: #f5f5f5; }
.ci-topbar-title { font-weight: 700; color: #333; }
.ci-shortcuts { margin-left: auto; font-size: 0.78em; color: #bbb; display: flex; gap: 14px; }
.sk { background: #f0f0f0; border-radius: 4px; padding: 1px 6px; font-family: monospace; font-size: 1em; color: #666; }

.ci-body { display: flex; flex: 1; overflow: hidden; }

.ci-left {
  flex: 65;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #f8f9fa;
  border-right: 1px solid #e0e0e0;
}

.search-wrap { padding: 12px 14px 0; position: relative; flex-shrink: 0; }
.ci-search-input {
  width: 100%;
  padding: 10px 14px;
  font-size: 1em;
  border: 2px solid #c62828;
  border-radius: 8px;
  outline: none;
  background: white;
  box-sizing: border-box;
}
.ci-search-input:focus { border-color: #b71c1c; }

.ci-search-dropdown {
  position: absolute;
  top: calc(100% + 2px);
  left: 14px;
  right: 14px;
  background: white;
  border: 1px solid #ddd;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  z-index: 100;
  max-height: 280px;
  overflow-y: auto;
  display: none;
}
.sri { padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f5f5f5; font-size: 0.9em; }
.sri:last-child { border-bottom: none; }
.sri:hover, .sri.highlighted { background: #fff5f5; }
.sri.highlighted { outline: 2px solid #c62828; outline-offset: -2px; }
.sri-left { display: flex; flex-direction: column; gap: 2px; }
.sri-nombre { font-weight: 600; color: #333; }
.sri-codigo { color: #aaa; font-size: 0.83em; }
.sri-costo { font-weight: 700; color: #c62828; white-space: nowrap; }
.sri-stock-warn { font-size: 0.78em; color: #e53935; font-weight: 600; }

.ci-cart-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; padding: 12px 14px; gap: 10px; }
.ci-cart-scroll { flex: 1; overflow-y: auto; background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.ci-cart-table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
.ci-cart-table th {
  position: sticky; top: 0; background: #f8f9fa;
  padding: 9px 10px; text-align: left;
  font-weight: 600; color: #666;
  border-bottom: 1px solid #e8e8e8;
  font-size: 0.8em; text-transform: uppercase;
}
.ci-cart-table td { padding: 8px 10px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
.ci-cart-table tr:last-child td { border-bottom: none; }
.ci-cart-table .c-idx   { width: 28px; color: #ccc; font-weight: 600; }
.ci-cart-table .c-qty   { width: 110px; }
.ci-cart-table .c-costo { width: 90px; text-align: right; color: #888; }
.ci-cart-table .c-total { width: 90px; text-align: right; font-weight: 700; }
.ci-cart-table .c-del   { width: 30px; text-align: center; }

.ci-qty-wrap { display: flex; align-items: center; gap: 4px; }
.ci-qty-btn {
  width: 24px; height: 24px; border-radius: 50%;
  border: 1px solid #ddd; background: white;
  cursor: pointer; font-size: 0.95em; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  color: #555; transition: all 0.12s; flex-shrink: 0;
}
.ci-qty-btn:hover { border-color: #c62828; color: #c62828; background: #fff5f5; }
.ci-qty-input {
  flex: 0 0 50px;
  width: 50px; padding: 4px 5px;
  border: 1px solid #ddd; border-radius: 4px;
  text-align: center; font-size: 0.95em;
  -moz-appearance: textfield;
  box-sizing: border-box;
}
.ci-qty-input::-webkit-inner-spin-button,
.ci-qty-input::-webkit-outer-spin-button { display: none; }
.ci-qty-input:focus { border-color: #c62828; outline: none; }

.ci-del-btn { background: none; border: none; cursor: pointer; color: #ddd; font-size: 1.1em; transition: color 0.15s; padding: 2px; }
.ci-del-btn:hover { color: #f44336; }

.ci-cart-empty { text-align: center; padding: 50px 20px; color: #ccc; }
.ci-cart-empty-icon { font-size: 2em; margin-bottom: 8px; }

.ci-cart-footer {
  background: white;
  border-radius: 8px;
  padding: 10px 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  flex-shrink: 0;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 16px;
}
.ci-total-label { font-size: 0.8em; color: #aaa; text-transform: uppercase; font-weight: 600; }
.ci-total-amount { font-size: 1.5em; font-weight: 800; color: #333; }

.ci-right {
  flex: 35;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: white;
}
.ci-right-scroll { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 18px; }
.ci-sec-title { font-size: 0.73em; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }

.ci-motivo-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: #fff3e0;
  border: 1px solid #ffb300;
  border-radius: 6px;
  font-size: 0.9em;
  font-weight: 600;
  color: #e65100;
}

.ci-textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid #e0e0e0;
  border-radius: 6px;
  font-size: 0.88em;
  resize: none;
  font-family: inherit;
  outline: none;
  box-sizing: border-box;
}
.ci-textarea:focus { border-color: #c62828; }

#ci-error {
  font-size: 0.82em;
  color: #c62828;
  background: #ffebee;
  border-left: 3px solid #c62828;
  border-radius: 4px;
  padding: 8px 12px;
  display: none;
}

.ci-confirm-wrap { padding: 12px 14px; border-top: 1px solid #f0f0f0; flex-shrink: 0; }
.ci-confirm-btn {
  width: 100%;
  padding: 14px;
  background: #c62828;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1.05em;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.15s;
}
.ci-confirm-btn:hover:not(:disabled) { background: #b71c1c; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(198,40,40,0.35); }
.ci-confirm-btn:disabled { opacity: 0.42; cursor: not-allowed; transform: none; box-shadow: none; }
</style>

<div id="ci-root">

  <div class="ci-topbar">
    <button class="ci-back-btn" id="ci-back">← Volver</button>
    <span class="ci-topbar-title">⏰ Vencimientos</span>
    <div class="ci-shortcuts">
      <span><span class="sk">↑↓</span> navegar</span>
      <span><span class="sk">Enter</span> agregar</span>
      <span><span class="sk">Esc</span> limpiar</span>
    </div>
  </div>

  <div class="ci-body">

    <!-- Izquierda: búsqueda + carrito -->
    <div class="ci-left">
      <div class="search-wrap">
        <input type="text" id="ci-search-input" class="ci-search-input"
          placeholder="Código, nombre del producto o código de barras..." autocomplete="off" spellcheck="false">
        <div id="ci-search-dropdown" class="ci-search-dropdown"></div>
      </div>

      <div class="ci-cart-wrap">
        <div class="ci-cart-scroll" id="ci-cart-scroll">
          <table class="ci-cart-table" id="ci-cart-table">
            <thead>
              <tr>
                <th class="c-idx">#</th>
                <th>Producto</th>
                <th class="c-qty">Cantidad</th>
                <th class="c-costo">Costo unit.</th>
                <th class="c-total">Total costo</th>
                <th class="c-del"></th>
              </tr>
            </thead>
            <tbody id="ci-cart-body">
              <tr><td colspan="6">
                <div class="ci-cart-empty">
                  <div class="ci-cart-empty-icon">⏰</div>
                  Buscá los productos vencidos para darlos de baja
                </div>
              </td></tr>
            </tbody>
          </table>
        </div>

        <div class="ci-cart-footer">
          <span class="ci-total-label">Costo total</span>
          <span class="ci-total-amount" id="ci-total">$0</span>
        </div>
      </div>
    </div>

    <!-- Derecha: motivo fijo + confirmar -->
    <div class="ci-right">
      <div class="ci-right-scroll">
        <div>
          <div class="ci-sec-title">Motivo</div>
          <div class="ci-motivo-badge">⏰ Producto vencido</div>
        </div>

        <div>
          <div class="ci-sec-title">Observaciones</div>
          <textarea id="ci-obs" class="ci-textarea" rows="4" placeholder="Descripción adicional (opcional)..."></textarea>
        </div>

        <div id="ci-error"></div>
      </div>

      <div class="ci-confirm-wrap">
        <button class="ci-confirm-btn" id="ci-confirm" disabled>Registrar vencimiento</button>
      </div>
    </div>

  </div>
</div>
