<style>
  /* ── OPERACIONES DE STOCK ─────────────────────────────────────── */
  .ops-root {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: var(--color-background);
  }

  .ops-header {
    background: linear-gradient(135deg, #2e7d32 0%, #388e3c 100%);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  .ops-header h2 { margin: 0; font-size: 1.15rem; color: white; font-weight: 600; }

  .ops-body {
    flex: 1;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    max-width: 720px;
  }

  /* Group card */
  .ops-group {
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border: 1px solid var(--color-border);
  }

  .ops-group-header {
    background: #2e7d32;
    color: white;
    padding: 11px 20px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ops-group-header.egreso { background: #c62828; }

  .ops-group-body {
    background: var(--color-background);
    padding: 16px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  /* Action buttons */
  .ops-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 22px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 2px solid transparent;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    white-space: nowrap;
    user-select: none;
  }

  .ops-btn-active {
    background: #e8f5e9;
    border-color: #2e7d32;
    color: #1b5e20;
  }
  .ops-btn-active:hover { background: #c8e6c9; }

  .ops-btn-active.egreso {
    background: #ffebee;
    border-color: #c62828;
    color: #b71c1c;
  }
  .ops-btn-active.egreso:hover { background: #ffcdd2; }

  .ops-btn-disabled {
    background: var(--color-hover);
    border-color: var(--color-border);
    color: var(--color-text-secondary);
    cursor: not-allowed;
    opacity: 0.6;
  }

  /* Pending resumen card */
  .ops-pending-card {
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(255,143,0,0.18);
    border: 2px solid #ffb300;
  }
  .ops-pending-header {
    background: linear-gradient(135deg, #ff8f00, #ffa000);
    color: white; padding: 11px 20px;
    font-size: 14px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .ops-pending-body {
    background: #fff8e1; padding: 16px 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .ops-pending-text { flex: 1; font-size: 13px; color: #5d4037; line-height: 1.5; }
  .ops-pending-btn {
    background: #ff8f00; color: white; border: none;
    border-radius: 24px; padding: 10px 24px;
    font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .ops-pending-btn:hover { background: #ff6f00; }
  .ops-pending-descartar {
    background: none; border: 1px solid #ffb300; border-radius: 24px;
    padding: 8px 16px; font-size: 13px; color: #8d6e63; cursor: pointer; white-space: nowrap;
  }
  .ops-pending-descartar:hover { background: #ffecb3; }

  /* Historial overlay */
  .ops-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center; z-index: 200;
  }
  .ops-overlay-box {
    background: white; border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .ops-overlay-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid #e0e6ee;
    font-weight: 700; font-size: 15px; color: #1a2e4a;
  }
  .ops-overlay-close {
    background: none; border: none; font-size: 22px; color: #8090a0; cursor: pointer; line-height: 1;
  }
  .ops-overlay-close:hover { color: #445566; }
</style>

<div class="ops-root" id="ops-root">
  <div class="ops-header">
    <h2>📦 Operaciones de Stock</h2>
  </div>

  <div class="ops-body">

    <!-- Ajuste de precios pendiente (se muestra dinámicamente) -->
    <div class="ops-pending-card" id="ops-pending-card" style="display:none">
      <div class="ops-pending-header">⏸ Ajuste de precios pendiente</div>
      <div class="ops-pending-body">
        <div class="ops-pending-text">
          Tenés un <strong>ajuste de precios sin finalizar</strong> de tu última compra.<br>
          El stock ya fue ingresado. Solo resta actualizar los precios de venta.
        </div>
        <button class="ops-pending-btn" data-action="retomar">Retomar ahora →</button>
        <button class="ops-pending-descartar" data-action="descartar-pendiente">Descartar</button>
      </div>
    </div>

    <!-- Ingreso -->
    <div class="ops-group">
      <div class="ops-group-header">+ Ingreso de mercadería</div>
      <div class="ops-group-body">
        <button class="ops-btn ops-btn-active" data-action="compras">🛒 Compras</button>
        <button class="ops-btn ops-btn-active" data-action="historial_compras">📋 Historial de compras</button>
        <button class="ops-btn ops-btn-active" data-action="devolucion">↩ Devolución</button>
        <button class="ops-btn ops-btn-disabled" data-action="traspaso_ingreso">🔄 Traspaso entre tiendas</button>
        <button class="ops-btn ops-btn-disabled" data-action="consignacion">📋 Consignación</button>
      </div>
    </div>

    <!-- Egreso -->
    <div class="ops-group">
      <div class="ops-group-header egreso">− Egreso de mercadería</div>
      <div class="ops-group-body">
        <button class="ops-btn ops-btn-active egreso" data-action="ajuste_stock">📉 Ajuste de stock</button>
        <button class="ops-btn ops-btn-active egreso" data-action="consumo_interno">🏠 Consumo interno</button>
        <button class="ops-btn ops-btn-active egreso" data-action="vencimientos">⏰ Vencimientos</button>
        <button class="ops-btn ops-btn-active egreso" data-action="roturas">💔 Roturas / producto defectuoso</button>
        <button class="ops-btn ops-btn-disabled egreso" data-action="traspaso_egreso">🔄 Traspaso entre tiendas</button>
      </div>
    </div>

  </div>
</div>

<!-- ── HISTORIAL DE COMPRAS OVERLAY ── -->
<div id="ops-historial-overlay" class="ops-overlay" style="display:none">
  <div class="ops-overlay-box" style="width:880px;max-width:95vw;max-height:88vh">
    <div class="ops-overlay-header">
      <span>Historial de compras</span>
      <button class="ops-overlay-close" id="ops-historial-close">×</button>
    </div>
    <div style="padding:12px 16px;border-bottom:1px solid #e0e6ee;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div style="display:flex;flex-direction:column;gap:3px">
        <label style="font-size:10px;font-weight:700;color:#607080;text-transform:uppercase">Desde</label>
        <input type="date" id="ops-hist-desde" style="padding:5px 8px;border:1px solid #c8d0dc;border-radius:5px;font-size:13px">
      </div>
      <div style="display:flex;flex-direction:column;gap:3px">
        <label style="font-size:10px;font-weight:700;color:#607080;text-transform:uppercase">Hasta</label>
        <input type="date" id="ops-hist-hasta" style="padding:5px 8px;border:1px solid #c8d0dc;border-radius:5px;font-size:13px">
      </div>
      <button id="ops-hist-filtrar" style="padding:5px 14px;background:#2e7d32;color:white;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:600">Filtrar</button>
      <button id="ops-hist-limpiar" style="padding:5px 14px;background:#eef0f3;color:#445566;border:none;border-radius:5px;cursor:pointer;font-size:13px">Limpiar</button>
    </div>
    <div id="ops-historial-body" style="overflow-y:auto;flex:1;padding:12px 16px"></div>
  </div>
</div>

<!-- ── DETALLE COMPRA OVERLAY ── -->
<div id="ops-detalle-overlay" class="ops-overlay" style="display:none">
  <div class="ops-overlay-box" style="width:720px;max-width:95vw;max-height:88vh">
    <div class="ops-overlay-header">
      <span>Detalle de compra</span>
      <button class="ops-overlay-close" id="ops-detalle-close">×</button>
    </div>
    <div id="ops-detalle-body" style="overflow-y:auto;flex:1;padding:20px"></div>
  </div>
</div>

<script type="module" src="./js/modules/operaciones_stock.js"></script>
