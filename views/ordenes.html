<style>
  /* ── ÓRDENES DE COMPRA ─────────────────────────────────────────────────── */
  .ord-root {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: var(--color-background-secondary, #f0f2f5);
    font-size: 13px;
  }

  /* Header */
  .ord-header {
    background: linear-gradient(135deg, #1a2e4a 0%, #1e3a5f 100%);
    color: white;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    gap: 12px;
  }
  .ord-header-left { display: flex; align-items: center; gap: 12px; }
  .ord-header-title { font-size: 15px; font-weight: 800; letter-spacing: 0.03em; text-transform: uppercase; }
  .ord-btn-back {
    background: rgba(255,255,255,0.12); color: white;
    border: 1px solid rgba(255,255,255,0.3); padding: 5px 14px;
    border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 500;
  }
  .ord-btn-back:hover { background: rgba(255,255,255,0.22); }
  .ord-btn-primary {
    background: #43a047; color: white; border: none;
    padding: 7px 18px; border-radius: 6px; font-size: 13px;
    font-weight: 700; cursor: pointer;
  }
  .ord-btn-primary:hover { background: #388e3c; }

  /* ── LISTA VIEW ────────────────────────────────────────────────────────── */
  .ord-lista-wrap { flex: 1; padding: 24px 28px; }

  .ord-filter-bar {
    display: flex; gap: 4px; margin-bottom: 18px;
    border-bottom: 2px solid #d0d7e3;
  }
  .ord-filter-tab {
    padding: 7px 18px; border: none; background: none;
    font-size: 13px; font-weight: 600; color: #607080;
    cursor: pointer; border-radius: 6px 6px 0 0;
    border-bottom: 3px solid transparent; margin-bottom: -2px;
  }
  .ord-filter-tab.active {
    color: #1e3a5f; border-bottom-color: #1e3a5f; background: white;
  }
  .ord-filter-tab:hover:not(.active) { background: #e8ecf0; }

  .ord-table-wrap { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
  .ord-table { width: 100%; border-collapse: collapse; }
  .ord-table th {
    padding: 9px 12px; text-align: left; font-weight: 700; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.04em;
    color: #607080; border-bottom: 2px solid #e0e6ee; background: #f8f9fb;
  }
  .ord-table td { padding: 10px 12px; border-bottom: 1px solid #eef0f3; color: #2a3a4a; }
  .ord-table tr:last-child td { border-bottom: none; }
  .ord-table tr:hover td { background: #f5f7fa; }
  .ord-empty {
    text-align: center; padding: 48px 0; color: #8090a0; font-size: 14px;
  }

  /* Estado badges */
  .ord-badge {
    display: inline-block; padding: 2px 10px; border-radius: 10px;
    font-size: 11px; font-weight: 700; white-space: nowrap;
  }
  .ord-badge-borrador   { background: #fff3e0; color: #e65100; }
  .ord-badge-revisada   { background: #e3f2fd; color: #1565c0; }
  .ord-badge-confirmada { background: #e8f5e9; color: #2e7d32; }
  .ord-badge-enviada    { background: #f3e5f5; color: #6a1b9a; }
  .ord-badge-recibiendo { background: #fce4ec; color: #880e4f; }
  .ord-badge-cerrada    { background: #eceff1; color: #546e7a; }

  .ord-btn-sm {
    padding: 4px 12px; border: 1px solid #c8d0dc; background: white;
    border-radius: 4px; cursor: pointer; font-size: 12px; color: #445566;
  }
  .ord-btn-sm:hover { background: #f0f4f8; }
  .ord-btn-sm-primary {
    padding: 4px 12px; border: none; background: #1e3a5f;
    border-radius: 4px; cursor: pointer; font-size: 12px; color: white;
  }
  .ord-btn-sm-primary:hover { background: #162d4a; }
  .ord-btn-eliminar { color: #c0392b; border-color: #e8b4b0; padding: 4px 8px; }
  .ord-btn-eliminar:hover { background: #fde8e8; border-color: #c0392b; }

  /* ── ORDEN VIEW ────────────────────────────────────────────────────────── */
  .ord-orden-root { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

  /* Tab bar */
  .ord-tab-bar {
    display: flex; align-items: flex-end; gap: 2px;
    padding: 8px 16px 0; background: #1e3a5f;
    overflow-x: auto; flex-shrink: 0;
  }
  .ord-tab-bar::-webkit-scrollbar { height: 4px; }
  .ord-tab-bar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 2px; }

  .ord-tab {
    padding: 7px 16px; border-radius: 6px 6px 0 0;
    font-size: 12px; font-weight: 600; cursor: pointer;
    white-space: nowrap; border: none; transition: background 0.12s;
    flex-shrink: 0;
    background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7);
  }
  .ord-tab:hover { background: rgba(255,255,255,0.22); color: white; }
  .ord-tab.active { background: white; color: #1e3a5f; }
  .ord-tab-badge {
    display: inline-block; margin-left: 6px; padding: 0 6px;
    border-radius: 8px; font-size: 10px;
    background: rgba(255,255,255,0.25); color: inherit;
  }
  .ord-tab.active .ord-tab-badge { background: #e0e6ee; }

  /* Orden body */
  .ord-orden-body {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; background: white;
  }

  /* Orden info bar */
  .ord-orden-infobar {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 10px 20px; border-bottom: 1px solid #e0e6ee;
    background: #f8f9fb; flex-shrink: 0;
  }
  .ord-orden-infobar-proveedor { font-size: 15px; font-weight: 800; color: #1a2e4a; }
  .ord-orden-infobar-fecha { font-size: 12px; color: #607080; }
  .ord-notas-input {
    flex: 1; min-width: 180px; padding: 4px 8px;
    border: 1px solid #d0d7e3; border-radius: 5px;
    font-size: 12px; color: #445566;
  }
  .ord-notas-input:focus { outline: none; border-color: #1e3a5f; }

  /* Items table */
  .ord-items-wrap { flex: 1; overflow: auto; }
  .ord-items-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ord-items-table th {
    position: sticky; top: 0; z-index: 2;
    padding: 8px 8px; text-align: right;
    font-weight: 700; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.03em; color: #607080;
    background: #f0f2f5; border-bottom: 2px solid #d0d7e3;
    white-space: nowrap;
  }
  .ord-items-table th:first-child,
  .ord-items-table th:nth-child(2) { text-align: left; }
  .ord-items-table td {
    padding: 6px 8px; border-bottom: 1px solid #eef0f3;
    text-align: right; color: #2a3a4a; white-space: nowrap;
  }
  .ord-items-table td:first-child,
  .ord-items-table td:nth-child(2) { text-align: left; white-space: normal; }
  .ord-items-table td:nth-child(2) { min-width: 160px; }
  .ord-items-table tr:hover td { background: #f8f9fb; }

  .ord-cell-input {
    width: 72px; padding: 3px 6px;
    border: 1px solid #d0d7e3; border-radius: 4px;
    font-size: 12px; text-align: right; background: white;
  }
  .ord-cell-input:focus { outline: none; border-color: #1e3a5f; background: #f0f4ff; }
  .ord-cell-input-text { text-align: left; width: 130px; }
  .ord-cell-apedir {
    background: #fffde7; border-color: #f9a825; font-weight: 700; width: 72px;
  }
  .ord-cell-apedir:focus { background: #fff9c4; border-color: #f57f17; }

  .ord-dias-ok   { color: #2e7d32; }
  .ord-dias-warn { color: #e65100; font-weight: 600; }
  .ord-dias-crit { color: #b71c1c; font-weight: 700; }

  .ord-btn-del {
    background: none; border: none; cursor: pointer;
    color: #c0392b; font-size: 16px; padding: 2px 4px;
    border-radius: 4px; line-height: 1;
  }
  .ord-btn-del:hover { background: #fde8e8; }

  /* A pedir — display bloqueado + lápiz */
  .ord-apedir-wrap {
    display: flex; align-items: center; gap: 5px;
    background: #fffde7; border: 1px solid #f9a825;
    border-radius: 4px; padding: 3px 7px;
    white-space: nowrap;
  }
  .ord-apedir-label { font-weight: 700; font-size: 12px; color: #2a3a4a; flex: 1; }
  .ord-btn-edit-cant {
    background: none; border: none; cursor: pointer;
    color: #8090a0; font-size: 13px; padding: 0 2px; line-height: 1;
    flex-shrink: 0;
  }
  .ord-btn-edit-cant:hover { color: #1e3a5f; }
  .ord-btn-exportar { background: #e8eaf6; color: #3949ab; border: 1px solid #c5cae9; }
  .ord-btn-exportar:hover { background: #c5cae9; }
  .ord-btn-exportar:disabled { opacity: 0.6; cursor: default; }

  /* Overlay editar cantidad */
  .ord-editcant-box {
    background: white; border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    width: 320px; max-width: 95vw;
  }
  .ord-editcant-body {
    padding: 20px; display: flex; flex-direction: column; gap: 12px;
  }
  .ord-editcant-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.04em; color: #607080; margin-bottom: 4px;
  }
  .ord-editcant-row {
    display: flex; gap: 10px; align-items: flex-end;
  }
  .ord-editcant-input {
    flex: 0 0 90px; padding: 7px 10px; border: 1px solid #d0d7e3;
    border-radius: 6px; font-size: 14px; font-weight: 700; text-align: right;
  }
  .ord-editcant-input:focus { outline: none; border-color: #1e3a5f; background: #f0f4ff; }
  .ord-editcant-select {
    flex: 1; padding: 7px 10px; border: 1px solid #d0d7e3;
    border-radius: 6px; font-size: 13px; background: white;
  }
  .ord-editcant-select:focus { outline: none; border-color: #1e3a5f; }

  /* Action bar */
  .ord-action-bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 12px 20px; border-top: 1px solid #e0e6ee;
    background: #f8f9fb; flex-shrink: 0;
  }
  .ord-action-bar-left { flex: 1; display: flex; gap: 8px; align-items: center; }
  .ord-action-bar-right { display: flex; gap: 8px; }

  .ord-btn-action {
    padding: 8px 20px; border-radius: 6px; font-size: 13px;
    font-weight: 700; cursor: pointer; border: none;
  }
  .ord-btn-save      { background: #e8f5e9; color: #2e7d32; }
  .ord-btn-save:hover { background: #c8e6c9; }
  .ord-btn-revisar   { background: #e3f2fd; color: #1565c0; }
  .ord-btn-revisar:hover { background: #bbdefb; }
  .ord-btn-confirmar { background: #1e3a5f; color: white; }
  .ord-btn-confirmar:hover { background: #162d4a; }
  .ord-btn-enviar    { background: #6a1b9a; color: white; }
  .ord-btn-enviar:hover { background: #4a148c; }
  .ord-btn-add       { background: #fff8e1; color: #f57f17; border: 1px solid #ffcc02; }
  .ord-btn-add:hover { background: #fff3cd; }

  /* ── MODALES ───────────────────────────────────────────────────────────── */
  .ord-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center; z-index: 300;
  }
  .ord-overlay-box {
    background: white; border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .ord-overlay-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid #e0e6ee;
    font-weight: 700; font-size: 15px; color: #1a2e4a; flex-shrink: 0;
  }
  .ord-overlay-close {
    background: none; border: none; font-size: 22px;
    color: #8090a0; cursor: pointer; line-height: 1;
  }
  .ord-overlay-close:hover { color: #445566; }
  .ord-overlay-body { overflow-y: auto; flex: 1; padding: 16px 20px; }
  .ord-overlay-footer {
    padding: 12px 20px; border-top: 1px solid #e0e6ee;
    display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0;
  }
  .ord-btn-cancel {
    padding: 8px 20px; border-radius: 6px; font-size: 13px;
    font-weight: 600; cursor: pointer; background: #eef0f3;
    color: #445566; border: none;
  }
  .ord-btn-cancel:hover { background: #e0e4e8; }

  /* Generar modal — provider list */
  .ord-prov-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    border: 1px solid #e0e6ee; margin-bottom: 6px; transition: background 0.1s;
  }
  .ord-prov-item:hover { background: #f5f7fa; }
  .ord-prov-item.today { border-color: #43a047; background: #f1f8e9; }
  .ord-prov-item input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
  .ord-prov-name { font-weight: 600; color: #1a2e4a; flex: 1; }
  .ord-prov-day  { font-size: 11px; color: #43a047; font-weight: 700; }

  /* Buscar producto */
  .ord-search-input {
    width: 100%; padding: 8px 12px; border: 1px solid #d0d7e3;
    border-radius: 6px; font-size: 13px; margin-bottom: 10px;
    box-sizing: border-box;
  }
  .ord-search-result {
    padding: 8px 12px; border-radius: 6px; cursor: pointer;
    border: 1px solid #e0e6ee; margin-bottom: 4px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .ord-search-result:hover, .ord-search-result.highlighted { background: #f0f4ff; }
  .ord-search-result.highlighted { outline: 2px solid #667eea; outline-offset: -2px; }
  .ord-row-focus td { background: #eef2ff !important; }
  .ord-row-focus td:first-child { border-left: 3px solid #667eea; }
</style>

<div class="ord-root" id="ord-root">

  <!-- HEADER -->
  <div class="ord-header">
    <div class="ord-header-left">
      <button class="ord-btn-back" id="ord-btn-back" style="display:none">← Volver</button>
      <span class="ord-header-title" id="ord-header-title">Órdenes de Compra</span>
    </div>
    <div>
      <button class="ord-btn-primary" id="ord-btn-generar">+ Generar orden</button>
    </div>
  </div>

  <!-- VIEW: LISTA -->
  <div id="ord-view-lista" class="ord-lista-wrap">
    <div class="ord-filter-bar">
      <button class="ord-filter-tab active" data-filter="activas">Activas</button>
      <button class="ord-filter-tab" data-filter="enviadas">Enviadas</button>
      <button class="ord-filter-tab" data-filter="historial">Historial</button>
    </div>
    <div class="ord-table-wrap">
      <table class="ord-table">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Proveedor</th>
            <th style="text-align:center">Items</th>
            <th>Estado</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="ord-lista-tbody"></tbody>
      </table>
      <div id="ord-lista-empty" class="ord-empty" style="display:none">
        No hay órdenes en este estado.
      </div>
    </div>
  </div>

  <!-- VIEW: ORDEN -->
  <div id="ord-view-orden" class="ord-orden-root" style="display:none">

    <div class="ord-tab-bar" id="ord-tab-bar"></div>

    <div class="ord-orden-body">

      <div class="ord-orden-infobar">
        <span class="ord-orden-infobar-proveedor" id="ord-infobar-proveedor"></span>
        <span class="ord-badge" id="ord-infobar-badge"></span>
        <span class="ord-orden-infobar-fecha" id="ord-infobar-fecha"></span>
        <input class="ord-notas-input" id="ord-notas-input" placeholder="Notas de la orden…">
      </div>

      <div class="ord-items-wrap">
        <table class="ord-items-table">
          <thead id="ord-items-thead"></thead>
          </thead>
          <tbody id="ord-items-tbody"></tbody>
        </table>
      </div>

      <div class="ord-action-bar">
        <div class="ord-action-bar-left">
          <button class="ord-btn-action ord-btn-add" id="ord-btn-add-item">+ Agregar producto</button>
        </div>
        <div class="ord-action-bar-right" id="ord-action-btns"></div>
      </div>

    </div>
  </div>

</div><!-- ord-root -->

<!-- MODAL: GENERAR ÓRDENES -->
<div id="ord-generar-overlay" class="ord-overlay" style="display:none">
  <div class="ord-overlay-box" style="width:520px;max-width:95vw;max-height:80vh">
    <div class="ord-overlay-header">
      <span>Generar órdenes de compra</span>
      <button class="ord-overlay-close" id="ord-generar-close">×</button>
    </div>
    <div class="ord-overlay-body" id="ord-generar-body"></div>
    <div class="ord-overlay-footer">
      <button class="ord-btn-cancel" id="ord-generar-cancel">Cancelar</button>
      <button class="ord-btn-action ord-btn-confirmar" id="ord-generar-ok">Generar</button>
    </div>
  </div>
</div>

<!-- MODAL: AGREGAR PRODUCTO MANUAL -->
<div id="ord-agregar-overlay" class="ord-overlay" style="display:none">
  <div class="ord-overlay-box" style="width:440px;max-width:95vw;max-height:75vh">
    <div class="ord-overlay-header">
      <span>Agregar producto</span>
      <button class="ord-overlay-close" id="ord-agregar-close">×</button>
    </div>
    <div class="ord-overlay-body">
      <input class="ord-search-input" id="ord-agregar-search"
             placeholder="Buscar por nombre o código de barras…" autocomplete="off">
      <div id="ord-agregar-results"></div>
    </div>
  </div>
</div>

<!-- OVERLAY: EDITAR CANTIDAD A PEDIR -->
<div id="ord-edit-cant-overlay" class="ord-overlay" style="display:none">
  <div class="ord-editcant-box">
    <div class="ord-overlay-header">
      <span>Editar pedido</span>
      <button class="ord-overlay-close" id="ord-editcant-close">×</button>
    </div>
    <div class="ord-editcant-body">
      <div>
        <div class="ord-editcant-label">Pedido sugerido</div>
        <div class="ord-editcant-row">
          <input type="number" id="ord-editcant-cant" class="ord-editcant-input"
                 min="0" step="1" placeholder="0">
          <select id="ord-editcant-unidad" class="ord-editcant-select">
            <option value="unidad">Unidad</option>
            <option value="kg">Kg</option>
            <option value="bulto_cerrado">Bulto cerrado</option>
            <option value="pack">Pack</option>
            <option value="display">Display</option>
            <option value="bolsa">Bolsa</option>
          </select>
        </div>
      </div>
    </div>
    <div class="ord-overlay-footer">
      <button class="ord-btn-cancel" id="ord-editcant-cancel">Cancelar</button>
      <button class="ord-btn-action ord-btn-confirmar" id="ord-editcant-ok">Confirmar</button>
    </div>
  </div>
</div>

<script type="module" src="./js/modules/ordenes.js"></script>
