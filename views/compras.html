<style>
  /* ── COMPRAS MODULE ──────────────────────────────────────────────────────── */
  .cmp-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--color-border);
    background: var(--color-background);
  }
  .cmp-toolbar h2 { margin: 0; font-size: 1.35rem; }
  .cmp-toolbar-right { display: flex; gap: 8px; }

  /* Table */
  .cmp-table-wrap { padding: 20px; overflow-x: auto; }
  .cmp-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .cmp-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-secondary);
    border-bottom: 1px solid var(--color-border);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .cmp-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--color-border);
    vertical-align: middle;
  }
  .cmp-table tr:hover td { background: var(--color-hover); }
  .cmp-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--color-text-secondary);
    font-size: 15px;
    display: none;
  }

  /* Estado badges */
  .cmp-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .cmp-badge-borrador       { background: #f0f0f0; color: #666; }
  .cmp-badge-confirmada     { background: #e8f5e9; color: #2e7d32; }
  .cmp-badge-pendiente_pago { background: #fff3e0; color: #e65100; }
  .cmp-badge-pagada         { background: #e3f2fd; color: #1565c0; }

  /* ── NUEVA COMPRA — FULL SCREEN OVERLAY ─────────────────────────────────── */
  #cmp-nueva-overlay {
    position: fixed;
    inset: 0;
    background: var(--color-background);
    z-index: 300;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .cmp-nueva-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    flex-shrink: 0;
    z-index: 10;
  }
  .cmp-nueva-header h3 { margin: 0; font-size: 1rem; color: white; }
  .cmp-nueva-header .btn-ghost {
    background: rgba(255,255,255,0.2); color: white;
    border: 1px solid rgba(255,255,255,0.35);
  }
  .cmp-nueva-header .btn-ghost:hover { background: rgba(255,255,255,0.32); }

  /* Step indicators */
  .cmp-steps {
    display: flex;
    padding: 0 20px;
    border-bottom: 1px solid #e0e0e0;
    background: white;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .cmp-step-ind {
    padding: 10px 16px;
    font-size: 13px;
    color: #aaa;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    margin-bottom: -1px;
  }
  .cmp-step-ind.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }
  .cmp-step-ind.done { color: #2e7d32; }

  /* Body & Footer */
  .cmp-nueva-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  .cmp-nueva-footer {
    border-top: 1px solid #e0e0e0;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    flex-shrink: 0;
  }

  /* Form */
  .cmp-form-group { margin-bottom: 18px; }
  .cmp-form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--color-text);
  }
  .cmp-form-group label .req { color: #c62828; }
  .cmp-form-group input,
  .cmp-form-group select,
  .cmp-form-group textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    font-size: 14px;
    background: var(--color-surface, #fff);
    color: var(--color-text);
    box-sizing: border-box;
  }
  .cmp-form-row { display: flex; gap: 16px; }
  .cmp-form-row .cmp-form-group { flex: 1; }

  /* Searchable dropdown */
  .cmp-search-wrap { position: relative; }
  .cmp-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--color-surface, #fff);
    border: 1px solid var(--color-border);
    border-top: none;
    border-radius: 0 0 6px 6px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 20;
    display: none;
    box-shadow: 0 4px 12px rgba(0,0,0,.1);
  }
  .cmp-dropdown.open { display: block; }
  .cmp-dd-item {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
  }
  .cmp-dd-item:hover,
  .cmp-dd-item.highlighted { background: var(--color-hover); }

  /* Radio payment */
  .cmp-radio-group { display: flex; flex-direction: column; gap: 10px; }
  .cmp-radio-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    cursor: pointer;
    padding: 10px 14px;
    border: 1px solid var(--color-border);
    border-radius: 6px;
  }
  .cmp-radio-label:has(input:checked) {
    border-color: var(--color-primary);
    background: var(--color-hover);
  }
  .cmp-radio-label input[type=radio] { width: auto; margin: 0; }

  /* ── STEP 1 — OC CARDS ──────────────────────────────────────────────────── */
  .cmp-oc-section-label {
    font-size: 0.73em; font-weight: 700; color: #aaa;
    text-transform: uppercase; letter-spacing: 0.07em; margin: 14px 0 6px;
  }
  .cmp-oc-card {
    background: #f5f7ff; border: 1px solid #c5cdf9; border-radius: 6px;
    padding: 10px 14px; cursor: pointer; margin-bottom: 6px;
    display: flex; align-items: center; justify-content: space-between;
    transition: all 0.15s;
  }
  .cmp-oc-card:hover { background: #eef0ff; }
  .cmp-oc-card.selected { border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.2); background: #eef0ff; }
  .cmp-oc-card-main { font-weight: 600; color: #333; font-size: 0.9em; }
  .cmp-oc-card-sub  { color: #888; font-size: 0.82em; margin-top: 2px; }
  .cmp-oc-check { font-size: 1em; color: #667eea; flex-shrink: 0; }

  /* ── STEP 2 — POS LAYOUT ─────────────────────────────────────────────────── */
  .cmp-step2-layout {
    display: flex; height: 100%; min-height: 0; background: #f0f2f5;
  }

  /* LEFT */
  .cmp-step2-left {
    flex: 65; display: flex; flex-direction: column;
    overflow: hidden; background: #f8f9fa;
    border-right: 1px solid #e0e0e0; min-width: 0;
  }
  .cmp-s2-scan-bar { padding: 12px 14px 0; position: relative; flex-shrink: 0; }
  .cmp-scan-input-wrap { position: relative; }
  #cmp-scan-input {
    width: 100%; padding: 10px 14px; font-size: 1em;
    border: 2px solid #667eea; border-radius: 8px;
    outline: none; background: white; box-sizing: border-box;
  }
  #cmp-scan-input:focus { border-color: #764ba2; }

  /* Scan dropdown — POS sri style */
  #cmp-scan-dd {
    position: absolute; top: calc(100% + 2px); left: 0; right: 0;
    background: white; border: 1px solid #ddd; border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 100;
    max-height: 280px; overflow-y: auto; display: none;
  }
  #cmp-scan-dd.open { display: block; }
  .cmp-sri {
    padding: 10px 14px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #f5f5f5; font-size: 0.9em;
  }
  .cmp-sri:last-child { border-bottom: none; }
  .cmp-sri:hover, .cmp-sri.highlighted { background: #f0f4ff; }
  .cmp-sri.highlighted { outline: 2px solid #667eea; outline-offset: -2px; }
  .cmp-sri-left { display: flex; flex-direction: column; gap: 2px; }
  .cmp-sri-nombre { font-weight: 600; color: #333; }
  .cmp-sri-codigo { color: #aaa; font-size: 0.83em; }
  .cmp-sri-costo  { font-weight: 700; color: #667eea; white-space: nowrap; }

  /* Cart area */
  .cmp-cart-wrap {
    flex: 1; overflow: hidden; display: flex; flex-direction: column;
    padding: 12px 14px; gap: 10px;
  }
  .cmp-cart-scroll {
    flex: 1; overflow-y: auto; background: white;
    border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .cmp-items-table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
  .cmp-items-table th {
    position: sticky; top: 0; background: #f8f9fa; padding: 9px 10px;
    text-align: left; font-weight: 600; color: #666;
    border-bottom: 1px solid #e8e8e8; font-size: 0.8em; text-transform: uppercase; z-index: 1;
  }
  .cmp-items-table td { padding: 8px 10px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
  .cmp-items-table tr:last-child td { border-bottom: none; }
  .cmp-items-table input[type=number] {
    padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px;
    font-size: 0.93em; text-align: right; outline: none;
    -moz-appearance: textfield; transition: border-color 0.1s;
  }
  .cmp-items-table input[type=number]:focus { border-color: #667eea; background: #f9f9ff; }
  .cmp-items-table input[type=number]::-webkit-outer-spin-button,
  .cmp-items-table input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .cmp-items-table select { padding: 3px 5px; font-size: 0.85em; border: 1px solid #ddd; border-radius: 4px; }
  .cmp-cant-inp  { width: 60px !important; text-align: center !important; }
  .cmp-costo-inp { width: 80px !important; }
  .cmp-udspaq-inp { width: 52px !important; }
  .cmp-costo-changed { color: #e65100; font-weight: 700; }
  .cmp-costo-changed-input { border-color: #e65100 !important; }
  .cmp-items-empty {
    text-align: center; padding: 50px 20px; color: #ccc;
  }
  .cmp-items-empty-icon { font-size: 2em; margin-bottom: 8px; }

  /* Cart footer */
  .cmp-items-footer {
    background: white; border-radius: 8px; padding: 12px 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); flex-shrink: 0;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .cmp-items-count { color: #888; font-size: 0.85em; }
  .cmp-items-total-label { font-size: 0.72em; color: #aaa; text-align: right; }
  .cmp-items-total { font-size: 1.65em; font-weight: 800; color: #333; text-align: right; }

  /* RIGHT */
  .cmp-step2-right {
    flex: 35; display: flex; flex-direction: column;
    overflow: hidden; background: white; min-width: 0;
  }
  .cmp-step2-right-scroll {
    flex: 1; overflow-y: auto; padding: 14px;
    display: flex; flex-direction: column;
  }
  .cmp-s2-section-label {
    font-size: 0.73em; font-weight: 700; color: #aaa;
    text-transform: uppercase; letter-spacing: 0.07em; margin: 14px 0 6px;
  }
  .cmp-s2-prov-card {
    background: #f5f7ff; border: 1px solid #c5cdf9; border-radius: 6px;
    padding: 10px 12px; display: flex; justify-content: space-between; align-items: center;
  }
  .cmp-s2-prov-info { flex: 1; }
  .cmp-s2-prov-name { font-weight: 700; color: #333; font-size: 0.92em; }
  .cmp-s2-deuda-badge {
    font-size: 0.8em; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; background: #ffebee; color: #c62828;
    display: inline-block; margin-top: 3px;
  }
  .cmp-s2-saldo-ok {
    font-size: 0.8em; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; background: #e8f5e9; color: #2e7d32;
    display: inline-block; margin-top: 3px;
  }
  .cmp-s2-orden-item {
    background: white; border: 1px solid #e0e0e0; border-radius: 6px;
    padding: 8px 12px; cursor: pointer; margin-bottom: 4px;
    font-size: 0.88em; transition: all 0.15s;
  }
  .cmp-s2-orden-item:hover { background: #f5f7ff; border-color: #c5cdf9; }
  .cmp-s2-orden-item.selected { border-color: #667eea; background: #f0f4ff; box-shadow: 0 0 0 2px rgba(102,126,234,0.2); }

  /* Payment chips */
  .cmp-s2-pago-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .cmp-pago-chip {
    display: flex; align-items: center; gap: 4px; padding: 6px 10px;
    border: 2px solid #e0e0e0; border-radius: 20px; cursor: pointer;
    font-size: 0.82em; font-weight: 600; color: #aaa;
    background: white; transition: all 0.15s; user-select: none;
  }
  .cmp-pago-chip:hover { border-color: #bbb; color: #777; }
  .cmp-pago-chip.active[data-pago="efectivo"]      { border-color: #4CAF50; color: #2e7d32; background: #e8f5e9; }
  .cmp-pago-chip.active[data-pago="transferencia"] { border-color: #ff9800; color: #e65100; background: #fff3e0; }
  .cmp-pago-chip.active[data-pago="pendiente"]     { border-color: #607d8b; color: #37474f; background: #eceff1; }

  /* Entrego / Vuelto */
  .cmp-pinput-row { background: #f8f9fa; border-radius: 8px; padding: 10px 12px; margin-top: 8px; }
  .cmp-pinput-label { font-size: 0.8em; font-weight: 700; color: #666; margin-bottom: 6px; }
  .cmp-pinput-field {
    width: 100%; padding: 8px 10px; border: 1px solid #e0e0e0;
    border-radius: 6px; font-size: 1em; font-weight: 700; text-align: right;
    outline: none; box-sizing: border-box; -moz-appearance: textfield;
  }
  .cmp-pinput-field:focus { border-color: #4CAF50; }
  .cmp-pinput-field::-webkit-outer-spin-button,
  .cmp-pinput-field::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .cmp-vuelto-box {
    margin-top: 6px; padding: 6px 10px; background: #e8f5e9;
    border-radius: 6px; font-size: 0.88em; color: #2e7d32; font-weight: 600;
  }

  /* Factura collapsible */
  .cmp-s2-factura-details {
    margin-top: 10px; border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden;
  }
  .cmp-s2-factura-details summary {
    cursor: pointer; font-size: 0.85em; color: #888; font-weight: 600;
    padding: 8px 12px; background: #f8f9fa; user-select: none;
  }
  .cmp-s2-factura-fields { padding: 10px 12px; }
  .cmp-s2-factura-fields .cmp-form-group { margin-bottom: 8px; }
  .cmp-s2-factura-fields .cmp-form-group:last-child { margin-bottom: 0; }

  /* Confirm area — fixed at bottom of right panel */
  .cmp-s2-confirm-wrap {
    padding: 12px 14px; border-top: 1px solid #f0f0f0; flex-shrink: 0;
  }
  .cmp-s2-total-line {
    display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px;
  }
  .cmp-s2-total-label { font-size: 0.72em; color: #aaa; }
  .cmp-s2-total-amount { font-size: 1.65em; font-weight: 800; color: #333; }
  .cmp-s2-confirmar-btn {
    width: 100%; padding: 14px; background: #4CAF50; color: white; border: none;
    border-radius: 8px; font-size: 1.05em; font-weight: 800;
    cursor: pointer; transition: all 0.15s;
  }
  .cmp-s2-confirmar-btn:hover:not(:disabled) {
    background: #43A047; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(76,175,80,0.4);
  }
  .cmp-s2-confirmar-btn:disabled { opacity: 0.42; cursor: not-allowed; transform: none; box-shadow: none; }
  .cmp-s2-pausar-btn {
    width: 100%; margin-top: 7px; padding: 7px;
    background: none; border: 1px solid #e0e0e0; border-radius: 6px;
    cursor: pointer; font-size: 0.85em; color: #888; font-weight: 600; transition: all 0.15s;
  }
  .cmp-s2-pausar-btn:hover { background: #f5f5f5; border-color: #bbb; }

  /* Paused compras list */
  .cmp-pausadas-section { padding: 14px 20px 0; }
  .cmp-pausadas-section h4 {
    font-size: 12px; font-weight: 700; color: #888;
    text-transform: uppercase; letter-spacing: .04em; margin: 0 0 8px;
  }
  .cmp-pausada-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border: 1px solid #ffe082; background: #fff8e1;
    border-radius: 6px; margin-bottom: 6px; font-size: 13px;
  }
  .cmp-pausada-row span { color: #888; font-size: 12px; }

  /* New product mini-form */
  .cmp-new-prod-form {
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-radius: 8px;
    padding: 16px;
  }
  .cmp-new-prod-form h4 { margin: 0 0 12px; font-size: 13px; color: #e65100; }
  .cmp-new-prod-form input,
  .cmp-new-prod-form select {
    width: 100%;
    padding: 7px 9px;
    border: 1px solid var(--color-border);
    border-radius: 5px;
    font-size: 13px;
    box-sizing: border-box;
    margin-bottom: 8px;
    background: #fff;
  }
  .cmp-new-prod-form label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 3px;
    color: var(--color-text);
  }

  /* ── STEP 3 — REVIEW ─────────────────────────────────────────────────────── */
  .cmp-review-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 20px; }
  .cmp-review-table th {
    text-align: left;
    padding: 8px 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-secondary);
    border-bottom: 1px solid var(--color-border);
    text-transform: uppercase;
  }
  .cmp-review-table td { padding: 10px; border-bottom: 1px solid var(--color-border); }
  .cmp-totals-box {
    background: var(--color-surface, #fff);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 16px;
    max-width: 360px;
    margin-left: auto;
    margin-bottom: 20px;
  }
  .cmp-totals-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 14px;
  }
  .cmp-totals-row.grand {
    font-size: 17px;
    font-weight: 700;
    border-top: 1px solid var(--color-border);
    margin-top: 8px;
    padding-top: 12px;
  }
  .cmp-pago-info {
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 12px;
    font-size: 14px;
  }
  .cmp-pago-efectivo  { background: #e8f5e9; border: 1px solid #a5d6a7; color: #2e7d32; }
  .cmp-pago-pendiente { background: #fff3e0; border: 1px solid #ffcc80; color: #e65100; }

  /* ── STEP 4 — PRICE ADJUSTMENT ───────────────────────────────────────────── */
  .cmp-price-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
  .cmp-price-table th {
    text-align: left;
    padding: 8px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--color-text-secondary);
    border-bottom: 1px solid var(--color-border);
    text-transform: uppercase;
  }
  .cmp-price-table td { padding: 8px 10px; border-bottom: 1px solid var(--color-border); vertical-align: middle; }
  .cmp-price-table input[type=number] {
    width: 90px; padding: 4px 6px;
    border: 1px solid var(--color-border); border-radius: 4px; font-size: 13px;
  }
  .cmp-var-pos { color: #c62828; font-weight: 600; }
  .cmp-var-neg { color: #2e7d32; font-weight: 600; }
  .cmp-family-banner {
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 14px;
  }

  /* ── STEP 5 — RESUMEN ────────────────────────────────────────────────────── */
  .cmp-resumen-section {
    background: var(--color-surface, #fff);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .cmp-resumen-section h4 { margin: 0 0 14px; font-size: 15px; font-weight: 700; }
  .cmp-resumen-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--color-border);
  }
  .cmp-resumen-row:last-child { border-bottom: none; }
  .cmp-resumen-row span:first-child { color: var(--color-text-secondary); }
  .cmp-share-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }

  /* ── NAVIGATION GUARD ────────────────────────────────────────────────────── */
  #cmp-nav-guard {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #cmp-nav-guard.open { display: flex; }
  .cmp-guard-box {
    background: var(--color-background);
    border-radius: 10px;
    padding: 28px;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
  }
  .cmp-guard-box h4 { margin: 0 0 10px; }
  .cmp-guard-box p  { margin: 0 0 20px; color: var(--color-text-secondary); font-size: 14px; }
  .cmp-guard-actions { display: flex; gap: 10px; justify-content: flex-end; }
</style>

<!-- ── LISTA ──────────────────────────────────────────────────────────────── -->
<div class="cmp-toolbar">
  <h2>🛒 Compras</h2>
  <div class="cmp-toolbar-right">
    <button class="btn btn-primary" id="cmp-nueva-btn">+ Nueva Compra</button>
  </div>
</div>

<div class="cmp-table-wrap">
  <table class="cmp-table">
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Proveedor</th>
        <th>Factura</th>
        <th>Items</th>
        <th>Total</th>
        <th>Estado</th>
        <th>Pago</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="cmp-tbody"></tbody>
  </table>
  <div class="cmp-empty" id="cmp-empty">
    <div style="font-size:40px;margin-bottom:12px">📥</div>
    <div>No hay compras registradas.</div>
    <div style="margin-top:12px">
      <button class="btn btn-primary" id="cmp-empty-nueva-btn">+ Nueva Compra</button>
    </div>
  </div>
</div>

<!-- ── NUEVA COMPRA — FULL SCREEN ─────────────────────────────────────────── -->
<div id="cmp-nueva-overlay" style="display:none">
  <div class="cmp-nueva-header">
    <h3>Nueva Compra</h3>
    <button class="btn btn-ghost" id="cmp-nueva-close">✕ Cancelar</button>
  </div>
  <div class="cmp-steps" id="cmp-steps"><!-- rendered by JS --></div>
  <div class="cmp-nueva-body" id="cmp-nueva-body"><!-- rendered by JS --></div>
  <div class="cmp-nueva-footer" id="cmp-nueva-footer"><!-- rendered by JS --></div>
</div>

<!-- ── NAVIGATION GUARD ───────────────────────────────────────────────────── -->
<div id="cmp-nav-guard">
  <div class="cmp-guard-box">
    <h4>¿Salir de la compra?</h4>
    <p>Tenés productos cargados. ¿Qué querés hacer?</p>
    <div class="cmp-guard-actions" style="flex-direction:column;gap:8px">
      <button class="btn btn-primary" id="cmp-guard-pausar" style="width:100%">⏸ Pausar y continuar después</button>
      <button class="btn btn-danger" id="cmp-guard-leave" style="width:100%">🗑 Descartar y salir</button>
      <button class="btn btn-ghost" id="cmp-guard-stay" style="width:100%">← Seguir editando</button>
    </div>
  </div>
</div>

<!-- ── DETALLE COMPRA ──────────────────────────────────────────────────────── -->
<div id="cmp-detalle-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;align-items:center;justify-content:center">
  <div style="background:var(--color-background);border-radius:10px;width:min(700px,96vw);max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.18)">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--color-border);flex-shrink:0">
      <h4 style="margin:0">Detalle de compra</h4>
      <button class="btn btn-ghost btn-sm" id="cmp-detalle-close">✕ Cerrar</button>
    </div>
    <div id="cmp-detalle-body" style="overflow-y:auto;padding:20px;flex:1"></div>
  </div>
</div>
