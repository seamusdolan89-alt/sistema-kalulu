<style>
  /* ── COMPRAS MODULE ──────────────────────────────────────────────────────── */
  .cmp-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--color-border);
    background: var(--color-background);
  }
  .cmp-toolbar h2 { margin: 0; font-size: 1.35rem; }
  .cmp-toolbar-right { display: flex; gap: 8px; }

  /* Table */
  .cmp-table-wrap { padding: 20px; overflow-x: auto; }
  .cmp-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .cmp-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-secondary);
    border-bottom: 1px solid var(--color-border);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .cmp-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--color-border);
    vertical-align: middle;
  }
  .cmp-table tr:hover td { background: var(--color-hover); }
  .cmp-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--color-text-secondary);
    font-size: 15px;
    display: none;
  }

  /* Estado badges */
  .cmp-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .cmp-badge-borrador       { background: #f0f0f0; color: #666; }
  .cmp-badge-confirmada     { background: #e8f5e9; color: #2e7d32; }
  .cmp-badge-pendiente_pago { background: #fff3e0; color: #e65100; }
  .cmp-badge-pagada         { background: #e3f2fd; color: #1565c0; }

  /* ── NUEVA COMPRA — FULL SCREEN OVERLAY ─────────────────────────────────── */
  #cmp-nueva-overlay {
    position: fixed;
    inset: 0;
    background: var(--color-background);
    z-index: 300;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .cmp-nueva-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--color-border);
    background: var(--color-background);
    flex-shrink: 0;
  }
  .cmp-nueva-header h3 { margin: 0; font-size: 1.1rem; }

  /* Step indicators */
  .cmp-steps {
    display: flex;
    padding: 0 24px;
    border-bottom: 1px solid var(--color-border);
    background: var(--color-background);
    flex-shrink: 0;
    overflow-x: auto;
  }
  .cmp-step-ind {
    padding: 10px 18px;
    font-size: 13px;
    color: var(--color-text-secondary);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    margin-bottom: -1px;
  }
  .cmp-step-ind.active {
    color: var(--color-primary);
    border-bottom-color: var(--color-primary);
    font-weight: 600;
  }
  .cmp-step-ind.done { color: #2e7d32; }

  /* Body & Footer */
  .cmp-nueva-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  .cmp-nueva-footer {
    border-top: 1px solid var(--color-border);
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--color-background);
    flex-shrink: 0;
  }

  /* Form */
  .cmp-form-group { margin-bottom: 18px; }
  .cmp-form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--color-text);
  }
  .cmp-form-group label .req { color: #c62828; }
  .cmp-form-group input,
  .cmp-form-group select,
  .cmp-form-group textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    font-size: 14px;
    background: var(--color-surface, #fff);
    color: var(--color-text);
    box-sizing: border-box;
  }
  .cmp-form-row { display: flex; gap: 16px; }
  .cmp-form-row .cmp-form-group { flex: 1; }

  /* Searchable dropdown */
  .cmp-search-wrap { position: relative; }
  .cmp-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--color-surface, #fff);
    border: 1px solid var(--color-border);
    border-top: none;
    border-radius: 0 0 6px 6px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 20;
    display: none;
    box-shadow: 0 4px 12px rgba(0,0,0,.1);
  }
  .cmp-dropdown.open { display: block; }
  .cmp-dd-item {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
  }
  .cmp-dd-item:hover,
  .cmp-dd-item.highlighted { background: var(--color-hover); }

  /* Radio payment */
  .cmp-radio-group { display: flex; flex-direction: column; gap: 10px; }
  .cmp-radio-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    cursor: pointer;
    padding: 10px 14px;
    border: 1px solid var(--color-border);
    border-radius: 6px;
  }
  .cmp-radio-label:has(input:checked) {
    border-color: var(--color-primary);
    background: var(--color-hover);
  }
  .cmp-radio-label input[type=radio] { width: auto; margin: 0; }

  /* ── STEP 2 ──────────────────────────────────────────────────────────────── */
  .cmp-step2-layout {
    display: flex;
    gap: 20px;
    height: 100%;
    min-height: 400px;
  }
  .cmp-step2-left {
    flex: 65%;
    display: flex;
    flex-direction: column;
    min-width: 0;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    overflow: hidden;
  }
  .cmp-step2-right {
    flex: 35%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
  }

  .cmp-scan-panel {
    background: var(--color-surface, #fff);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 16px;
  }
  .cmp-scan-panel h4 {
    margin: 0 0 10px;
    font-size: 12px;
    color: var(--color-text-secondary);
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .cmp-scan-input-wrap { position: relative; }
  #cmp-scan-input {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid var(--color-primary);
    border-radius: 6px;
    font-size: 15px;
    box-sizing: border-box;
  }
  #cmp-scan-input:focus { outline: none; }

  /* Items left panel */
  .cmp-items-table-wrap {
    flex: 1;
    overflow-y: auto;
  }
  .cmp-items-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .cmp-items-table th {
    text-align: left;
    padding: 8px 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--color-text-secondary);
    border-bottom: 1px solid var(--color-border);
    text-transform: uppercase;
    position: sticky;
    top: 0;
    background: var(--color-surface, #fff);
    z-index: 1;
  }
  .cmp-items-table td {
    padding: 7px 8px;
    border-bottom: 1px solid var(--color-border);
    vertical-align: middle;
  }
  .cmp-items-table input[type=number] {
    width: 65px;
    padding: 3px 5px;
    border: 1px solid var(--color-border);
    border-radius: 4px;
    font-size: 13px;
    text-align: right;
  }
  .cmp-items-table select {
    padding: 3px 5px;
    font-size: 12px;
    border: 1px solid var(--color-border);
    border-radius: 4px;
    max-width: 100px;
  }
  .cmp-costo-changed { color: #e65100; font-weight: 600; }
  .cmp-costo-changed-input { border-color: #e65100 !important; }
  .cmp-items-footer {
    padding: 10px 12px;
    border-top: 2px solid var(--color-border);
    background: var(--color-surface, #fff);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }
  .cmp-items-total { font-size: 16px; font-weight: 700; }
  .cmp-items-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--color-text-secondary);
    font-size: 13px;
  }

  /* New product mini-form */
  .cmp-new-prod-form {
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-radius: 8px;
    padding: 16px;
  }
  .cmp-new-prod-form h4 { margin: 0 0 12px; font-size: 13px; color: #e65100; }
  .cmp-new-prod-form input,
  .cmp-new-prod-form select {
    width: 100%;
    padding: 7px 9px;
    border: 1px solid var(--color-border);
    border-radius: 5px;
    font-size: 13px;
    box-sizing: border-box;
    margin-bottom: 8px;
    background: #fff;
  }
  .cmp-new-prod-form label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 3px;
    color: var(--color-text);
  }

  /* ── STEP 3 — REVIEW ─────────────────────────────────────────────────────── */
  .cmp-review-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 20px; }
  .cmp-review-table th {
    text-align: left;
    padding: 8px 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-secondary);
    border-bottom: 1px solid var(--color-border);
    text-transform: uppercase;
  }
  .cmp-review-table td { padding: 10px; border-bottom: 1px solid var(--color-border); }
  .cmp-totals-box {
    background: var(--color-surface, #fff);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 16px;
    max-width: 360px;
    margin-left: auto;
    margin-bottom: 20px;
  }
  .cmp-totals-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 14px;
  }
  .cmp-totals-row.grand {
    font-size: 17px;
    font-weight: 700;
    border-top: 1px solid var(--color-border);
    margin-top: 8px;
    padding-top: 12px;
  }
  .cmp-pago-info {
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 12px;
    font-size: 14px;
  }
  .cmp-pago-efectivo  { background: #e8f5e9; border: 1px solid #a5d6a7; color: #2e7d32; }
  .cmp-pago-pendiente { background: #fff3e0; border: 1px solid #ffcc80; color: #e65100; }

  /* ── STEP 4 — PRICE ADJUSTMENT ───────────────────────────────────────────── */
  .cmp-price-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
  .cmp-price-table th {
    text-align: left;
    padding: 8px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--color-text-secondary);
    border-bottom: 1px solid var(--color-border);
    text-transform: uppercase;
  }
  .cmp-price-table td { padding: 8px 10px; border-bottom: 1px solid var(--color-border); vertical-align: middle; }
  .cmp-price-table input[type=number] {
    width: 90px; padding: 4px 6px;
    border: 1px solid var(--color-border); border-radius: 4px; font-size: 13px;
  }
  .cmp-var-pos { color: #c62828; font-weight: 600; }
  .cmp-var-neg { color: #2e7d32; font-weight: 600; }
  .cmp-family-banner {
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 14px;
  }

  /* ── STEP 5 — RESUMEN ────────────────────────────────────────────────────── */
  .cmp-resumen-section {
    background: var(--color-surface, #fff);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .cmp-resumen-section h4 { margin: 0 0 14px; font-size: 15px; font-weight: 700; }
  .cmp-resumen-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--color-border);
  }
  .cmp-resumen-row:last-child { border-bottom: none; }
  .cmp-resumen-row span:first-child { color: var(--color-text-secondary); }
  .cmp-share-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }

  /* ── NAVIGATION GUARD ────────────────────────────────────────────────────── */
  #cmp-nav-guard {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #cmp-nav-guard.open { display: flex; }
  .cmp-guard-box {
    background: var(--color-background);
    border-radius: 10px;
    padding: 28px;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
  }
  .cmp-guard-box h4 { margin: 0 0 10px; }
  .cmp-guard-box p  { margin: 0 0 20px; color: var(--color-text-secondary); font-size: 14px; }
  .cmp-guard-actions { display: flex; gap: 10px; justify-content: flex-end; }
</style>

<!-- ── LISTA ──────────────────────────────────────────────────────────────── -->
<div class="cmp-toolbar">
  <h2>🛒 Compras</h2>
  <div class="cmp-toolbar-right">
    <button class="btn btn-primary" id="cmp-nueva-btn">+ Nueva Compra</button>
  </div>
</div>

<div class="cmp-table-wrap">
  <table class="cmp-table">
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Proveedor</th>
        <th>Factura</th>
        <th>Items</th>
        <th>Total</th>
        <th>Estado</th>
        <th>Pago</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="cmp-tbody"></tbody>
  </table>
  <div class="cmp-empty" id="cmp-empty">
    <div style="font-size:40px;margin-bottom:12px">📥</div>
    <div>No hay compras registradas.</div>
    <div style="margin-top:12px">
      <button class="btn btn-primary" id="cmp-empty-nueva-btn">+ Nueva Compra</button>
    </div>
  </div>
</div>

<!-- ── NUEVA COMPRA — FULL SCREEN ─────────────────────────────────────────── -->
<div id="cmp-nueva-overlay" style="display:none">
  <div class="cmp-nueva-header">
    <h3>Nueva Compra</h3>
    <button class="btn btn-ghost" id="cmp-nueva-close">✕ Cancelar</button>
  </div>
  <div class="cmp-steps" id="cmp-steps"><!-- rendered by JS --></div>
  <div class="cmp-nueva-body" id="cmp-nueva-body"><!-- rendered by JS --></div>
  <div class="cmp-nueva-footer" id="cmp-nueva-footer"><!-- rendered by JS --></div>
</div>

<!-- ── NAVIGATION GUARD ───────────────────────────────────────────────────── -->
<div id="cmp-nav-guard">
  <div class="cmp-guard-box">
    <h4>¿Salir de la compra?</h4>
    <p>Hay datos sin guardar. Si salís ahora se perderán.</p>
    <div class="cmp-guard-actions">
      <button class="btn btn-ghost" id="cmp-guard-stay">Continuar cargando</button>
      <button class="btn btn-danger" id="cmp-guard-leave">Salir igualmente</button>
    </div>
  </div>
</div>
