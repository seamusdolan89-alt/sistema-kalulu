<style>
  /* ── GASTOS GENERALES ──────────────────────────────────────────────────────── */
  #gastos-root {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .gastos-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--color-border);
    flex-shrink: 0;
    gap: 12px;
  }
  .gastos-header h2 { margin: 0; font-size: 1.25rem; font-weight: 700; }
  .gastos-header-right { display: flex; gap: 8px; }

  /* ── TABS ─────────────────────────────────────────────────────────────────── */
  .gastos-tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--color-border);
    background: var(--color-background);
    padding: 0 20px;
    flex-shrink: 0;
  }
  .gastos-tab {
    padding: 11px 16px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-secondary);
    transition: color 0.15s;
  }
  .gastos-tab.active {
    color: var(--color-primary);
    border-bottom-color: var(--color-primary);
  }
  .gastos-tab:hover:not(.active) { color: var(--color-text); }

  /* ── CONTENT AREA ─────────────────────────────────────────────────────────── */
  #gastos-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  /* ── FORM ─────────────────────────────────────────────────────────────────── */
  .gastos-form-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 24px;
    max-width: 520px;
  }
  .gastos-form-card h3 { margin: 0 0 18px; font-size: 1rem; font-weight: 700; }

  .gastos-form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .gastos-form-grid .full { grid-column: 1 / -1; }

  .gastos-field { display: flex; flex-direction: column; gap: 4px; }
  .gastos-field label {
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .gastos-field input,
  .gastos-field select,
  .gastos-field textarea {
    padding: 8px 10px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: 14px;
    font-family: inherit;
    background: var(--color-background);
    color: var(--color-text);
    outline: none;
    transition: border-color 0.15s;
  }
  .gastos-field input:focus,
  .gastos-field select:focus,
  .gastos-field textarea:focus {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
  }
  .gastos-field textarea { resize: vertical; min-height: 64px; }

  .gastos-form-actions {
    margin-top: 18px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .gastos-error {
    margin-top: 10px;
    padding: 8px 12px;
    background: #fff0f0;
    border: 1px solid #fca5a5;
    border-radius: var(--radius-md);
    color: #dc2626;
    font-size: 13px;
    display: none;
  }

  /* ── FILTERS ──────────────────────────────────────────────────────────────── */
  .gastos-filters {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .gastos-filters input,
  .gastos-filters select {
    padding: 7px 10px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: 13px;
    background: var(--color-background);
    color: var(--color-text);
    outline: none;
  }
  .gastos-filters input:focus,
  .gastos-filters select:focus { border-color: var(--color-primary); }

  /* ── TABLE ────────────────────────────────────────────────────────────────── */
  .gastos-table-wrap { overflow-x: auto; }
  .gastos-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .gastos-table th {
    text-align: left;
    padding: 10px 12px;
    background: var(--color-surface);
    border-bottom: 2px solid var(--color-border);
    font-weight: 600;
    color: var(--color-text-secondary);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .gastos-table td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--color-border);
    vertical-align: middle;
  }
  .gastos-table tbody tr:hover { background: var(--color-surface); }
  .gastos-table .monto-cell { font-weight: 600; text-align: right; white-space: nowrap; }
  .gastos-table .actions-cell { text-align: center; }

  .gastos-empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--color-text-secondary);
    font-size: 14px;
  }

  /* ── CATEGORY BADGE ───────────────────────────────────────────────────────── */
  .cat-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .cat-servicios    { background: #eff6ff; color: #1d4ed8; }
  .cat-sueldos      { background: #f0fdf4; color: #15803d; }
  .cat-impuestos    { background: #fef9c3; color: #a16207; }
  .cat-alquiler     { background: #fdf4ff; color: #7e22ce; }
  .cat-mantenimiento{ background: #fff7ed; color: #c2410c; }
  .cat-honorarios   { background: #ecfdf5; color: #065f46; }
  .cat-publicidad   { background: #fdf2f8; color: #9d174d; }
  .cat-otros        { background: #f8fafc; color: #475569; }

  /* ── FOOTER TOTAL ─────────────────────────────────────────────────────────── */
  .gastos-total-bar {
    margin-top: 16px;
    padding: 12px 16px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    font-size: 15px;
  }
  .gastos-total-bar span { color: var(--color-text-secondary); }
  .gastos-total-bar strong { font-size: 17px; }

  /* ── RESUMEN ──────────────────────────────────────────────────────────────── */
  .gastos-resumen-filters {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .gastos-resumen-filters input,
  .gastos-resumen-filters select {
    padding: 7px 10px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: 13px;
    background: var(--color-background);
    color: var(--color-text);
    outline: none;
  }
  .gastos-resumen-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .gastos-resumen-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 16px;
  }
  .gastos-resumen-card .cat-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--color-text-secondary);
    margin-bottom: 6px;
  }
  .gastos-resumen-card .cat-total {
    font-size: 20px;
    font-weight: 700;
  }
  .gastos-resumen-card .cat-count {
    font-size: 11px;
    color: var(--color-text-secondary);
    margin-top: 2px;
  }
  .gastos-resumen-grand {
    background: var(--color-primary);
    color: #fff;
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .gastos-resumen-grand .label { font-size: 14px; font-weight: 600; opacity: 0.9; }
  .gastos-resumen-grand .total { font-size: 24px; font-weight: 800; }

  /* ── DELETE BTN ───────────────────────────────────────────────────────────── */
  .btn-del-gasto {
    background: none;
    border: 1px solid #fca5a5;
    border-radius: var(--radius-sm);
    color: #dc2626;
    padding: 3px 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-del-gasto:hover { background: #fef2f2; }
</style>

<div id="gastos-root"></div>
