<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de Gestión de Almacén (SGA) - 100% Offline">
  <meta name="theme-color" content="#0066cc">
  <title>Sistema Kalulu - Gestión de Almacén</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  
  <!-- PWA Manifest (optional) -->
  <link rel="manifest" href="./manifest.json">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>🏪 Sistema Kalulu</h1>
    <div class="header-user">
      <span id="user-name">Usuario</span>
      <span id="sync-badge" title="Firebase Sync" style="font-size:12px;cursor:default;user-select:none;">⚫</span>
      <button id="sync-now-btn" class="btn btn-outline btn-sm" title="Sincronizar ahora" style="min-width:70px;">⟳ Sync</button>
      <div class="backup-menu" id="backup-menu">
        <button class="btn btn-outline btn-sm" id="backup-btn" title="Backup de base de datos">💾</button>
        <div class="backup-dropdown" id="backup-dropdown">
          <button id="backup-export-btn">Exportar backup</button>
          <label id="backup-import-label">
            Restaurar backup
            <input type="file" id="backup-import-input" accept=".sqlite" style="display:none">
          </label>
        </div>
      </div>
      <button id="logout-btn" class="btn btn-outline btn-sm">Salir</button>
    </div>
  </header>

  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <nav>
      <ul>
        <!-- Navigation links will be populated by app.js -->
      </ul>
    </nav>
  </aside>

  <!-- Main Application Container -->
  <main id="app">
    <div class="alert alert-info">
      <strong>Cargando...</strong> Inicializando aplicación...
    </div>
  </main>

  <!-- Overlay de sincronización inicial (primer arranque en dispositivo nuevo) -->
  <div id="initial-sync-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#fff;">
    <div style="width:40px;height:40px;border:4px solid #444;border-top-color:#0066cc;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    <h2 style="font-size:1.2rem;margin:0">Descargando datos...</h2>
    <p id="initial-sync-progress" style="font-size:0.9rem;color:#aaa;max-width:320px;text-align:center">Conectando a Firebase...</p>
  </div>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

  <!-- Core JavaScript Modules -->
  <!-- Firebase SDK (9 compat) -->
  <script src="./js/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>

  <!-- Tesseract.js for OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>

  <!-- SheetJS for Excel import -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- html2canvas for image export -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <!-- Application Scripts -->
  <script src="./js/utils.js?v=3"></script>
  <script src="./js/db.js?v=3"></script>
  <script src="./js/auth.js?v=3"></script>
  <script src="./js/sync.js?v=3"></script>
  <script src="./js/print.js"></script>
  <script src="./js/seed.js" type="module"></script>
  <script type="module">
    const v = Date.now();
    await import(`./js/app.js?v=${v}`);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
  <script>
    (function() {
      const btn = document.getElementById('sync-now-btn');
      if (!btn) return;
      btn.addEventListener('click', async () => {
        if (!window.SGA_Sync?.isInitialized()) {
          btn.textContent = '❌ Sin conexión';
          setTimeout(() => { btn.textContent = '⟳ Sync'; }, 3000);
          return;
        }
        btn.disabled = true;
        btn.textContent = '⏳ Sync...';
        try {
          await window.SGA_Sync.syncNow();
          btn.textContent = '✓ Listo';
        } catch (err) {
          btn.textContent = '❌ Error';
        }
        setTimeout(() => { btn.textContent = '⟳ Sync'; btn.disabled = false; }, 3000);
      });
    })();
  </script>
</body>
</html>
